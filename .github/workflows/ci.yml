name: CI — ChoppingBlock Backend

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests fastapi uvicorn pydantic cryptography python-dotenv

      - name: Run backend tests
        working-directory: backend_engine
        run: python -m pytest tests/ -v --tb=short

      - name: Validate Python compilation
        run: |
          python -m py_compile backend_engine/config.py
          python -m py_compile backend_engine/main.py
          python -m py_compile backend_engine/anatomy/orchestrator.py
          python -m py_compile backend_engine/anatomy/brain_dispatcher.py
          python -m py_compile backend_engine/database/db_manager.py
          python -m py_compile backend_engine/workforce/tier1_executives/god_agent.py
          python -m py_compile backend_engine/workforce/tier1_executives/ceo_agent.py
          echo "✅ All Python files compile successfully"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: visual_hq
        run: |
          npm ci
          npm run build
